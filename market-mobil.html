  .track-map{position:relative;height:270px;background:#0d0f12}#trackmap{position:absolute;inset:0}.track-map .topfade{position:absolute;top:0;left:0;right:0;height:90px;z-index:500;background:linear-gradient(180deg,var(--bg),transparent);pointer-events:none}.track-map .nav{position:absolute;top:14px;left:16px;z-index:600}.track-eta{position:absolute;left:50%;top:16px;transform:translateX(-50%);z-index:600;background:rgba(13,15,18,.9);backdrop-filter:blur(10px);border:1px solid var(--y-line);border-radius:30px;padding:8px 16px;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow)}.track-eta .ic{width:16px;color:var(--y)}.track-eta .t{font-size:12.5px;font-weight:800}.track-eta .t b{color:var(--y);font-size:14px}.track-sheet{background:var(--bg);border-radius:22px 22px 0 0;margin-top:-22px;position:relative;z-index:10;padding:8px 0 4px}.track-sheet .grab{width:38px;height:4px;border-radius:4px;background:var(--s4);margin:6px auto 14px}.stages{display:flex;padding:0 22px 6px}.stage{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative}.stage .ring{width:38px;height:38px;border-radius:50%;background:var(--s2);border:2px solid var(--line-2);display:grid;place-items:center;color:var(--tx-3);z-index:2}.stage .ring .ic{width:18px}.stage .lab{font-size:9.5px;font-weight:800;color:var(--tx-3);text-align:center}.stage .bar{position:absolute;top:18px;left:-50%;width:100%;height:2.5px;background:var(--line-2);z-index:1}.stage:first-child .bar{display:none}.stage.done .ring{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}.stage.done .bar{background:var(--ok)}.stage.act .ring{background:var(--y);border-color:var(--y);color:#15140F;box-shadow:0 0 0 5px var(--y-glow)}.stage.act .bar{background:linear-gradient(90deg,var(--ok),var(--y))}.stage.act .lab{color:var(--y)}.courier-card{margin:16px 18px 0;background:var(--s2);border:1px solid var(--line);border-radius:16px;padding:13px;display:flex;align-items:center;gap:13px}.courier-card .av-c{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--y),var(--y-2));display:grid;place-items:center;color:#15140F;font-weight:900;font-size:17px;flex:none;position:relative}.courier-card .av-c .on-dot{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--ok);border:2.5px solid var(--s2)}.courier-card .body{flex:1}.courier-card .nm{font-size:14px;font-weight:900}.courier-card .role{font-size:11px;color:var(--tx-3);margin-top:2px}.call-btn{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;border:1px solid var(--line-2);background:var(--s3);color:var(--tx)}.call-btn.green{background:var(--ok-bg);border-color:rgba(38,194,129,.3);color:var(--ok)}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 30px;text-align:center}.empty .eic{width:78px;height:78px;border-radius:24px;background:var(--s2);border:1px solid var(--line);display:grid;place-items:center;color:var(--tx-4);margin-bottom:16px;font-size:34px}.empty h3{font-size:16px;font-weight:900}.empty p{font-size:12.5px;color:var(--tx-3);margin-top:6px;max-width:240px;line-height:1.5}.bottom-bar{position:absolute;left:0;right:0;bottom:80px;padding:12px 18px 14px;background:linear-gradient(180deg,transparent,var(--bg) 30%);z-index:18;display:none}.bottom-bar.show{display:block}.bigbtn{width:100%;height:54px;border-radius:15px;background:var(--y);border:none;color:#15140F;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 10px 30px rgba(242,169,0,.32)}.bigbtn .l{display:flex;align-items:center;gap:10px}.bigbtn .badge-n{background:#15140F;color:var(--y);min-width:24px;height:24px;border-radius:8px;display:grid;place-items:center;font-size:13px;font-weight:900;padding:0 6px}.bigbtn .r{font-size:16px;font-weight:900}.toast{left:50%;right:auto;transform:translateX(-50%) translateY(20px);bottom:104px;max-width:360px}.toast.on{transform:translateX(-50%) translateY(0)}
</style></head><body>

      <div class="hero" onclick="VZ.toast('₺150 üstü ücretsiz teslimat')"><div class="sub"><span>⚡</span> Hızlı atıştırmalık teslimatı</div><h1>Canın çektiyse 15 dakikada kapında.</h1><p>Çikolata, cips, içecek, dondurma ve acil ihtiyaçlar — tek mini-depo, aynı VIZZ kurye ağı.</p><div class="bag">🛒</div></div>

<script>
(function(){
const $=s=>document.querySelector(s), D=window.VIZZ, M=D.MARKET, fmt=n=>n.toLocaleString('tr-TR'); $('#logoTop').src=D.LOGO;
let cat='tum', cart=[], coupon=false, current='market', map=null, marker=null, raf=null;
const cartCount=()=>cart.reduce((s,i)=>s+i.qty,0), sub=()=>cart.reduce((s,i)=>s+i.price*i.qty,0), fee=()=>sub()>=M.freeOver?0:M.fee, disc=()=>coupon?Math.round(sub()*.08):0, total=()=>Math.max(0,sub()+fee()-disc());
let tt; function toast(m){const e=$('#toast');e.innerHTML='<svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M22 11.1V12a10 10 0 1 1-5.9-9.1"/><path d="m9 11 3 3L22 4"/></svg>'+m;e.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('on'),2000);}
function list(){return cat==='tum'?M.products:M.products.filter(p=>p.cat===cat)}
function qty(id){const it=cart.find(x=>x.id===id);return it?it.qty:0}
function filter(id){cat=id;renderCats();renderProducts();document.querySelector('#s-market').scrollTop=0}
function renderCats(){ $('#chips').innerHTML=M.cats.map(c=>`<button class="chip-c ${c.id===cat?'on':''}" onclick="VZ.filter('${c.id}')"><span class="emo">${c.emo}</span>${c.n}</button>`).join(''); $('#quick').innerHTML=M.cats.slice(1,9).map(c=>`<button class="qcat ${c.id===cat?'on':''}" onclick="VZ.filter('${c.id}')"><div class="e">${c.emo}</div>${c.n.split(' ')[0]}</button>`).join(''); }
function renderProducts(){ $('#products').innerHTML=list().map(p=>{const q=qty(p.id), off=p.stock<=0, low=p.stock>0&&p.stock<15;return `<div class="prod ${off?'off':''} ${low?'low':''}">${p.tag?`<span class="tag">${off?'Tükendi':p.tag}</span>`:''}<div class="ph">${p.img?`<img src="${p.img}" alt="${p.n}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">`:p.emo}</div><div class="nm">${p.n}</div><div class="unit">${p.unit}</div><div class="stock">${off?'Stok yok':low?'Son '+p.stock+' adet':'Stokta '+p.stock}</div><div class="bt"><div class="price">${p.old?`<del>₺${p.old}</del>`:''}₺${fmt(p.price)}</div>${q?`<div class="qty"><button onclick="VZ.change('${p.id}',-1)"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button><span class="n num">${q}</span><button onclick="VZ.change('${p.id}',1)"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button></div>`:`<button class="addbtn" ${off?'disabled':''} onclick="VZ.add('${p.id}')"><svg class="ic" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>`}</div></div>`}).join('');}
function add(id){const p=M.products.find(x=>x.id===id); if(!p||p.stock<=0)return; const it=cart.find(x=>x.id===id); if(it)it.qty++; else cart.push({...p,qty:1}); sync(); renderProducts(); toast(`<b>${p.n}</b> sepete eklendi`)}
function change(id,d){const it=cart.find(x=>x.id===id); if(!it)return; it.qty+=d; if(it.qty<=0)cart=cart.filter(x=>x!==it); sync(); renderProducts(); if(current==='sepet')buildCart();}
function sync(){const n=cartCount(), dot=$('#cartDot'); dot.textContent=n; dot.classList.toggle('show',n>0); syncBar();}
function syncBar(){const bar=$('#bottomBar'); if(!bar)return; const n=cartCount(); if(n>0&&(current==='market'||current==='sepet')){const sepet=current==='sepet'; bar.innerHTML=`<button class="bigbtn" onclick="VZ.${sepet?'checkout()':"go('sepet')"}"><span class="l"><span class="badge-n num">${n}</span>${sepet?'Siparişi onayla':'Sepeti gör'}</span><span class="r num">₺${fmt(total())}</span></button>`; bar.classList.add('show');} else {bar.classList.remove('show'); bar.innerHTML='';}}
syncBar();
function buildCart(){ if(!cart.length){$('#s-sepet').innerHTML=`<div class="pg-head"><h2>Sepetim</h2></div><div class="empty"><div class="eic">🛒</div><h3>Sepetin boş</h3><p>Atıştırmalıkları keşfet, VIZZ Market 15-25 dakikada getirsin.</p><button class="btn btn-y" onclick="VZ.go('market')">Market'e dön</button></div>`;return;} $('#s-sepet').innerHTML=`<div class="pg-head"><button class="navbtn" onclick="VZ.go('market')"><svg class="ic" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button><h2>Sepetim</h2><button class="navbtn" style="margin-left:auto" onclick="VZ.clear()"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg></button></div><div class="paybox"><svg class="ic" viewBox="0 0 24 24"><path d="M3 7h18v10H3z"/><circle cx="12" cy="12" r="2.5"/></svg><div><div class="t">Kapıda ödeme veya online kart</div><div class="s">MVP: kapıda ödeme · online kart fast-follow</div></div></div><div class="cart-items">${cart.map(i=>`<div class="citem"><div class="e">${i.img?`<img src="${i.img}" alt="${i.n}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">`:i.emo}</div><div class="body"><div class="nm">${i.n}</div><div class="unit">${i.unit}</div><div class="pr">₺${fmt(i.price*i.qty)}</div></div><div class="qty"><button onclick="VZ.change('${i.id}',-1)"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button><span class="n num">${i.qty}</span><button onclick="VZ.change('${i.id}',1)"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button></div></div>`).join('')}</div><div class="summary"><div class="ln">Ara toplam <b>₺${fmt(sub())}</b></div><div class="ln ${fee()?'' :'ok'}">Teslimat <b>${fee()?'₺'+fee().toFixed(2).replace('.',','):'Ücretsiz'}</b></div><div class="ln ok">₺${M.freeOver} üstü ücretsiz <b>${sub()>=M.freeOver?'Tamamlandı':'₺'+fmt(M.freeOver-sub())+' kaldı'}</b></div><div class="ln">Market kuponu <b style="color:var(--y);cursor:pointer" onclick="VZ.coupon()">${coupon?'−₺'+fmt(disc()):'VIZZMARKET'}</b></div><div class="div"></div><div class="total"><span>Toplam</span><span class="big">₺${fmt(total())}</span></div></div><div style="height:8px"></div>`;}
function couponOn(){coupon=!coupon; toast(coupon?'VIZZMARKET · %8 indirim uygulandı':'Kupon kaldırıldı'); buildCart(); syncBar();}
function clear(){cart=[];coupon=false;sync();buildCart();toast('Sepet temizlendi')}
function checkout(){toast('Market siparişi alındı · toplanıyor');buildTrack();setTimeout(()=>go('takip'),650)}
const courier=D.COURIERS.find(c=>c.status==='delivering')||D.COURIERS[0];
function buildTrack(){const items=cart.length?cart:[M.products[0]];$('#s-takip').innerHTML=`<div class="track-map"><div class="topfade"></div><div id="trackmap"></div><div class="nav"><button class="navbtn" onclick="VZ.go('market')"><svg class="ic" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button></div><div class="track-eta"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span class="t">Tahmini varış <b>12 dk</b></span></div></div><div class="track-sheet"><div class="grab"></div><div class="pad" style="margin-bottom:6px"><div class="sec-t">Market siparişin yolda</div><div class="sec-s">${courier.name}, VIZZ Market Deposu'ndan geliyor</div></div><div class="stages">${[['Alındı','M9 11l3 3L22 4'],['Toplanıyor','M9 5H7a2 2 0 0 0-2 2v12h14V7a2 2 0 0 0-2-2h-2'],['Paketlendi','M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4a2 2 0 0 0 1-1.7Z'],['Yolda','M5.5 17a3 3 0 1 0 0-.1M18.5 17a3 3 0 1 0 0-.1M8.5 17h6l-2.5-6H8'],['Teslim','M3 12h18M12 3l9 9-9 9']].map((s,i)=>`<div class="stage ${i<3?'done':i===3?'act':''}"><div class="bar"></div><div class="ring"><svg class="ic" viewBox="0 0 24 24"><path d="${s[1]}"/></svg></div><div class="lab">${s[0]}</div></div>`).join('')}</div><div class="courier-card"><div class="av-c">${courier.name.split(' ').map(p=>p[0]).join('')}<span class="on-dot"></span></div><div class="body"><div class="nm">${courier.name}</div><div class="role">VIZZ Kurye · termal sepet aktif</div></div><button class="call-btn" onclick="VZ.toast('Kurye mesajlaşma')"><svg class="ic" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg></button><button class="call-btn green" onclick="VZ.toast('Kurye aranıyor…')"><svg class="ic" viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/></svg></button></div><div class="summary">${items.slice(0,5).map(i=>`<div class="ln"><span>${i.qty||1}× ${i.n}</span><b>₺${fmt((i.qty||1)*i.price)}</b></div>`).join('')}<div class="div"></div><div class="total"><span>Sipariş #VZ-M207</span><span class="big">₺${fmt(total()||138)}</span></div></div><div style="height:8px"></div></div>`;setTimeout(initMap,80)}
function initMap(){const Y=D.YOZGAT,depo=(Y.zones.find(z=>z.n==='Cumhuriyet')||Y.zones[6]).c.slice(),home=(Y.zones.find(z=>z.n==='Bahçelievler')||Y.zones[11]).c.slice(); if(map){map.remove();map=null} if(raf)cancelAnimationFrame(raf); map=L.map('trackmap',{zoomControl:false,attributionControl:false,scrollWheelZoom:false}); const TILE_DARK='https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'; const TILE_LIGHT='https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'; function getTileUrl(){ return document.body.classList.contains('light-theme') ? TILE_LIGHT : TILE_DARK; } let trackTileLayer = L.tileLayer(getTileUrl(),{maxZoom:19}).addTo(map); window.addEventListener('vizz-theme-change',()=>{ if(trackTileLayer) trackTileLayer.setUrl(getTileUrl()); }); L.marker(depo,{icon:L.divIcon({className:'',html:'<div class="rest-pin" style="width:24px;height:24px;border-radius:8px">🛒</div>',iconSize:[24,24],iconAnchor:[12,12]})}).addTo(map).bindTooltip('VIZZ Market Deposu'); L.marker(home,{icon:L.divIcon({className:'',html:'<div style="width:30px;height:30px;border-radius:50%;background:var(--ok);border:2px solid var(--bg);display:grid;place-items:center">⌂</div>',iconSize:[30,30],iconAnchor:[15,15]})}).addTo(map); const bike='<svg viewBox="0 0 24 24"><circle cx="5.5" cy="17" r="3"/><circle cx="18.5" cy="17" r="3"/><path d="M8.5 17h6l-2.5-6H8m6.5 6 2-6h2.5"/></svg>'; marker=L.marker(depo,{icon:L.divIcon({className:'',html:`<div class="cm deliver"><div class="pin">${bike}</div></div>`,iconSize:[26,26],iconAnchor:[13,13]})}).addTo(map); const path=[]; for(let i=0;i<=45;i++)path.push([depo[0]+(home[0]-depo[0])*i/45,depo[1]+(home[1]-depo[1])*i/45]); L.polyline(path,{color:'#2a2f37',weight:5}).addTo(map); const live=L.polyline([path[0]],{color:'#FFC400',weight:5}).addTo(map); map.fitBounds(L.latLngBounds(path),{padding:[42,42]}); let t=.28,last=performance.now(); function step(now){const dt=Math.min(.05,(now-last)/1000);last=now;t+=dt/22;if(t>.95)t=.28;const k=Math.floor(t*(path.length-1));marker.setLatLng(path[k]);live.setLatLngs(path.slice(0,k+1));raf=requestAnimationFrame(step)} raf=requestAnimationFrame(step); setTimeout(()=>map.invalidateSize(),150)}
function go(v){document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('on',b.dataset.t===v));document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));current=v;if(v==='sepet')buildCart();if(v==='takip'&&!$('#s-takip').innerHTML.trim())buildTrack();$('#s-'+v).classList.add('on');$('#s-'+v).scrollTop=0;syncBar();}
document.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>go(b.dataset.t)); renderCats();renderProducts();window.VZ={filter,add,change,go,clear,checkout,coupon:couponOn,toast};
})();
</script></body></html>
