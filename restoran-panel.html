<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIZZ — Çapanoğlu Köftecisi · Operasyon</title>
<link rel="stylesheet" href="vizz-pro.css">
<style>
  .app{display:grid;grid-template-columns:64px 1fr;height:100vh;overflow:hidden}
  /* rail */
  .rail{background:var(--s1);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px}
  .rail .lg{width:40px;height:40px;border-radius:11px;object-fit:cover;background:#000;margin-bottom:10px}
  .rail .ni{width:48px;height:46px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--tx-3);font-size:8.5px;font-weight:600;transition:.14s;border:none;background:transparent;position:relative}
  .rail .ni:hover{background:var(--s3);color:var(--tx)}
  .rail .ni.on{background:var(--y-soft);color:var(--y)}
  .rail .ni.on::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--y);border-radius:3px}
  .rail .ni .ic{width:19px;height:19px}
  .rail .ni .cnt{position:absolute;top:5px;right:7px;min-width:15px;height:15px;padding:0 4px;border-radius:9px;background:var(--y);color:#15140F;font-size:9px;font-weight:800;display:grid;place-items:center;line-height:1}
  .rail .sp{flex:1}

  /* main */
  .main{display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .top{height:54px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line);background:var(--s1)}
  .top .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .top .brand .lg{width:32px;height:32px;border-radius:9px;object-fit:cover;background:#000;flex:none}
  .top .brand .nm{font-size:14px;font-weight:700;line-height:1.1;white-space:nowrap}
  .top .brand .nm .sub{display:block;color:var(--tx-3);font-weight:500;font-size:11px;margin-top:1px}
  .top .r{display:flex;align-items:center;gap:9px}
  .chip{display:flex;align-items:center;gap:7px;background:var(--s3);border:1px solid var(--line);border-radius:30px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--tx-2)}
  .chip b{color:var(--tx)} .chip .ic{color:var(--tx-3)}
  /* açık/kapalı toggle */
  .openTgl{display:inline-flex;align-items:center;gap:9px;background:var(--s3);border:1px solid var(--line-2);border-radius:30px;padding:5px 8px 5px 13px;font-size:12px;font-weight:700;color:var(--ok)}
  .openTgl.closed{color:var(--bad)}
  .sw{width:38px;height:21px;border-radius:30px;background:var(--ok);border:none;position:relative;flex:none;transition:.18s;cursor:pointer}
  .openTgl.closed .sw{background:var(--s4)}
  .sw i{position:absolute;top:2px;left:19px;width:17px;height:17px;border-radius:50%;background:#10120f;transition:.18s}
  .openTgl.closed .sw i{left:2px;background:var(--tx-3)}

  .content{flex:1;overflow:hidden;position:relative}
  .view{position:absolute;inset:0;overflow:auto;padding:16px;display:none}
  .view.on{display:block}

  .rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:14px;flex-wrap:wrap}
  .rhead h2{font-size:18px;font-weight:800}.rhead p{font-size:12px;color:var(--tx-3);margin-top:2px}

  /* ---------- KDS KANBAN ---------- */
  #v-pano{display:none;grid-template-rows:auto 1fr;gap:13px;padding:16px;position:absolute;inset:0;overflow:hidden}
  #v-pano.on{display:grid}
  .kstrip{display:grid;grid-template-columns:repeat(5,1fr);gap:11px}
  .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;min-height:0;overflow:hidden}
  .kcol{background:var(--s1);border:1px solid var(--line);border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden;min-height:0}
  .kcol-h{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-bottom:1px solid var(--line)}
  .kcol-h .t{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700}
  .kcol-h .t .dotc{width:8px;height:8px;border-radius:50%}
  .kcol-h .n{font-size:11px;font-weight:800;color:var(--tx-3);background:var(--s3);border-radius:20px;padding:2px 8px;min-width:22px;text-align:center}
  .kscroll{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:9px}
  .kscroll.empty-soft{justify-content:center}
  .kempty{text-align:center;color:var(--tx-4);font-size:11.5px;padding:20px 8px;border:1px dashed var(--line-2);border-radius:var(--r);line-height:1.6}

  /* sipariş kartı */
  .oc{background:var(--s2);border:1px solid var(--line);border-radius:var(--r-lg);padding:11px 12px;transition:.16s;position:relative;overflow:hidden}
  .oc:hover{border-color:var(--line-3)}
  .oc.flash{animation:flashIn .9s cubic-bezier(.16,1,.3,1)}
  @keyframes flashIn{0%{transform:translateY(-8px) scale(.97);box-shadow:0 0 0 2px var(--y)}55%{box-shadow:0 0 0 2px var(--y-line)}100%{transform:none;box-shadow:0 0 0 0 transparent}}
  .oc .r1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
  .oc .id{font-weight:800;color:var(--tx);font-size:13px;letter-spacing:.2px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .oc .cust{font-size:11px;color:var(--tx-3);font-weight:500;margin-top:3px}
  .oc .items{margin:8px 0;display:flex;flex-direction:column;gap:4px}
  .oc .it{display:flex;gap:7px;font-size:12px;color:var(--tx-2);align-items:baseline}
  .oc .it .q{color:var(--y);font-weight:800;min-width:18px;font-variant-numeric:tabular-nums}
  .oc .it .nm{flex:1;color:var(--tx)}
  .oc .it .note{display:block;color:var(--tx-3);font-size:10.5px;margin-top:1px}
  .oc .ftr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;padding-top:9px;border-top:1px solid var(--line)}
  .oc .tot{font-weight:800;color:var(--tx);font-size:13px}
  .oc .cd{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;font-variant-numeric:tabular-nums;padding:3px 8px;border-radius:20px;border:1px solid transparent;white-space:nowrap}
  .cd.ok{color:var(--ok);background:var(--ok-bg);border-color:rgba(38,194,129,.25)}
  .cd.warn{color:var(--warn);background:var(--warn-bg);border-color:rgba(245,166,35,.25)}
  .cd.bad{color:var(--bad);background:var(--bad-bg);border-color:rgba(255,90,82,.25);animation:pulse 1.4s infinite}
  .oc .adv{width:100%;margin-top:9px}
  .oc .courier-line{display:flex;align-items:center;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:11.5px;color:var(--tx-2)}
  .oc .courier-line .av{width:24px;height:24px;border-radius:7px;font-size:9px}
  /* kanal rozeti */
  .ch{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.3px;text-transform:uppercase}
  .ch .ic{width:11px;height:11px;stroke-width:2.4}
  .ch-vizz{background:var(--y-soft);color:var(--y);border:1px solid var(--y-line)}
  .ch-tel{background:var(--info-bg);color:var(--info);border:1px solid rgba(76,141,255,.25)}
  .ch-ys{background:rgba(169,139,255,.13);color:var(--purple);border:1px solid rgba(169,139,255,.25)}

  /* ---------- MENÜ ---------- */
  .menuwrap{display:grid;grid-template-columns:200px 1fr;gap:14px;align-items:start}
  .catlist{display:flex;flex-direction:column;gap:5px;position:sticky;top:0}
  .catlist button{display:flex;align-items:center;justify-content:space-between;gap:8px;background:transparent;border:1px solid transparent;border-radius:var(--r);padding:10px 13px;font-size:12.5px;font-weight:600;color:var(--tx-2);text-align:left;transition:.14s}
  .catlist button:hover{background:var(--s2);color:var(--tx)}
  .catlist button.on{background:var(--y-soft);border-color:var(--y-line);color:var(--y)}
  .catlist button .c{font-size:11px;font-weight:800;color:var(--tx-3)}
  .catlist button.on .c{color:var(--y)}
  .menucard{display:flex;gap:13px;padding:12px;align-items:center}
  .menucard.off{opacity:.55}
  .menucard .ph{width:74px;height:74px;border-radius:var(--r);object-fit:cover;flex:none;background:var(--s4)}
  .menucard .info{flex:1;min-width:0}
  .menucard .info h4{font-size:13.5px;font-weight:700;color:var(--tx);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .menucard .info .ds{font-size:11.5px;color:var(--tx-3);margin-top:3px}
  .menucard .info .px{font-size:14px;font-weight:800;color:var(--y);margin-top:7px}
  .menucard .ctl{display:flex;flex-direction:column;align-items:flex-end;gap:9px;flex:none}
  /* toggle (stok/86) */
  .t86{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--ok);background:none;border:none}
  .t86.off{color:var(--tx-3)}
  .t86 .sw{width:36px;height:20px;background:var(--ok)}
  .t86 .sw i{left:18px;width:16px;height:16px;background:#06130d}
  .t86.off .sw{background:var(--s4)} .t86.off .sw i{left:2px;background:var(--tx-3)}

  /* ---------- KURYE ---------- */
  .crow{display:flex;align-items:center;gap:13px;padding:13px 15px}
  .crow .info{flex:1;min-width:0}
  .crow .info b{color:var(--tx);font-size:13px}
  .crow .info .sub{color:var(--tx-3);font-size:11.5px;margin-top:2px}
  .stepper{display:flex;align-items:center;gap:0;margin:6px 0 2px}
  .stepper .st{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative}
  .stepper .st .bub{width:26px;height:26px;border-radius:50%;background:var(--s3);border:1.5px solid var(--line-2);display:grid;place-items:center;color:var(--tx-3);z-index:2}
  .stepper .st .bub .ic{width:13px;height:13px}
  .stepper .st.done .bub{background:var(--ok);border-color:var(--ok);color:#06130d}
  .stepper .st.act .bub{background:var(--y);border-color:var(--y);color:#15140F;box-shadow:0 0 0 4px var(--y-glow)}
  .stepper .st .lb{font-size:10px;font-weight:600;color:var(--tx-3)}
  .stepper .st.done .lb,.stepper .st.act .lb{color:var(--tx)}
  .stepper .st::before{content:"";position:absolute;top:13px;left:-50%;width:100%;height:2px;background:var(--line-2);z-index:1}
  .stepper .st:first-child::before{display:none}
  .stepper .st.done::before,.stepper .st.act::before{background:var(--ok)}

  /* ---------- RAPORLAR ---------- */
  .rgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:13px}
  .rgrid .card{display:flex;flex-direction:column}
  .chart{width:100%;flex:1;min-height:0}
  .col-4{grid-column:span 4}.col-6{grid-column:span 6}.col-8{grid-column:span 8}

  /* ---------- AYARLAR ---------- */
  .setgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:900px}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .setrow:last-child{border-bottom:none}
  .setrow .lab{font-size:12.5px;font-weight:600;color:var(--tx)}
  .setrow .lab .ds{display:block;font-size:11px;color:var(--tx-3);font-weight:400;margin-top:2px}
  .swp{width:42px;height:23px;border-radius:30px;background:var(--ok);border:none;position:relative;flex:none;cursor:pointer;transition:.16s}
  .swp i{position:absolute;top:2px;left:21px;width:19px;height:19px;border-radius:50%;background:#06130d;transition:.16s}
  .swp.off{background:var(--s4)} .swp.off i{left:2px;background:var(--tx-3)}

  @media(max-width:1240px){.kanban{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:980px){.menuwrap{grid-template-columns:1fr}.catlist{flex-direction:row;flex-wrap:wrap;position:static}.setgrid{grid-template-columns:1fr}.kstrip{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<div class="app">
  <!-- RAIL -->
  <aside class="rail">
    <img class="lg" id="logo" alt="VIZZ">
    <button class="ni on" data-v="pano" title="Sipariş Panosu"><svg class="ic" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Panel<span class="cnt" id="railCnt">5</span></button>
    <button class="ni" data-v="menu" title="Menü"><svg class="ic" viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h12"/></svg>Menü</button>
    <button class="ni" data-v="kurye" title="Kurye"><svg class="ic" viewBox="0 0 24 24"><circle cx="5.5" cy="17" r="3"/><circle cx="18.5" cy="17" r="3"/><path d="M8.5 17h6l-2.5-6H8m6.5 6 2-6h2.5"/></svg>Kurye</button>
    <button class="ni" data-v="raporlar" title="Raporlar"><svg class="ic" viewBox="0 0 24 24"><path d="M3 3v18h18"/><rect x="7" y="9" width="3" height="8" rx="1"/><rect x="13" y="5" width="3" height="12" rx="1"/></svg>Rapor</button>
    <div class="sp"></div>
    <button class="ni" data-v="ayarlar" title="Ayarlar"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 2.6 14H2a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4 8.4a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 9 4.6V4a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V10a2 2 0 1 1 0 4h-.1Z"/></svg>Ayar</button>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="top">
      <div class="brand">
        <img class="lg" id="logo2" alt="">
        <div class="nm">Çapanoğlu Köftecisi <span class="sub" id="viewName">· Sipariş Panosu</span></div>
      </div>
      <div class="r">
        <button class="openTgl" id="openTgl"><span id="openLab">Açık</span><span class="sw"><i></i></span></button>
        <span class="chip"><svg class="ic ic-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><b id="clock">--:--</b></span>
        <button class="btn btn-y" id="demoBtn"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Yeni Sipariş (demo)</button>
      </div>
    </div>

    <div class="content">
      <!-- ============ SİPARİŞ PANOSU (KDS KANBAN) ============ -->
      <section id="v-pano" class="on">
        <div class="kstrip" id="kpis"></div>
        <div class="kanban" id="kanban"></div>
      </section>

      <!-- ============ MENÜ YÖNETİMİ ============ -->
      <section id="v-menu" class="view"></section>

      <!-- ============ KURYE ============ -->
      <section id="v-kurye" class="view"></section>

      <!-- ============ RAPORLAR ============ -->
      <section id="v-raporlar" class="view">
        <div class="rhead"><div><h2>Raporlar</h2><p>Çapanoğlu Köftecisi · bugünün operasyon karnesi</p></div>
          <div class="seg"><button class="on">Bugün</button><button>7 gün</button><button>30 gün</button></div></div>
        <div class="kstrip" id="repKpis" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px"></div>
        <div id="reportGrid" class="rgrid"></div>
      </section>

      <!-- ============ AYARLAR ============ -->
      <section id="v-ayarlar" class="view"></section>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="vizz-data.js"></script>
<script>
(function(){
const $ = s => document.querySelector(s);
const D = window.VIZZ;
const R = D.RESTAURANTS[0];           // Çapanoğlu Köftecisi
document.getElementById('logo').src = D.LOGO;
document.getElementById('logo2').src = D.LOGO;

const C = { y:'#FFC400', y2:'#F2A900', ok:'#26C281', warn:'#F5A623', bad:'#FF5A52', info:'#4C8DFF', purple:'#A98BFF',
  tx2:'#A4AAB3', tx3:'#70767E', line:'rgba(255,255,255,.07)', s3:'#1C2026', s4:'#252A31' };
const rnd=(a,b)=>a+Math.random()*(b-a);
const charts=[]; function mkChart(id){const c=echarts.init(document.getElementById(id),null,{renderer:'canvas'});charts.push(c);return c;}
window.addEventListener('resize',()=>charts.forEach(c=>c.resize()));
const axisBase={axisLine:{lineStyle:{color:C.line}},axisTick:{show:false},splitLine:{lineStyle:{color:C.line}},axisLabel:{color:C.tx3,fontSize:10},nameTextStyle:{color:C.tx3}};
const baseTip={backgroundColor:'#1C2026',borderColor:'rgba(255,255,255,.12)',textStyle:{color:'#E9EBEE',fontSize:12},padding:[8,11]};

/* ---------- toast ---------- */
let tt; function toast(m){ const e=$('#toast'); e.innerHTML='<svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M22 11.1V12a10 10 0 1 1-5.9-9.1"/><path d="m9 11 3 3L22 4"/></svg>'+m; e.classList.add('on'); clearTimeout(tt); tt=setTimeout(()=>e.classList.remove('on'),2400); }

/* ---------- saat ---------- */
function clock(){const d=new Date();$('#clock').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
clock(); setInterval(clock,15000);

/* ---------- açık/kapalı ---------- */
let isOpen=true;
$('#openTgl').onclick=function(){ isOpen=!isOpen; this.classList.toggle('closed',!isOpen);
  $('#openLab').textContent=isOpen?'Açık':'Kapalı';
  toast(isOpen?'Restoran <b>açık</b> — yeni siparişler kabul ediliyor':'Restoran <b>kapatıldı</b> — vitrinde "kapalı" görünüyor'); };

/* ===================================================================
   SİPARİŞ PANOSU — KDS KANBAN
   aşamalar: yeni → hazirlaniyor → hazir → kuryede → tamamlandi
   =================================================================== */
const STAGES=[
  {k:'yeni',        t:'Yeni',         col:C.bad,  next:'Hazırla',      nextK:'hazirlaniyor'},
  {k:'hazirlaniyor',t:'Hazırlanıyor', col:C.warn, next:'Hazır',        nextK:'hazir'},
  {k:'hazir',       t:'Hazır',        col:C.info, next:'Kurye Çağır',  nextK:'kuryede'},
  {k:'kuryede',     t:'Kuryede',      col:C.y,    next:'Teslim Edildi',nextK:'tamamlandi'},
  {k:'tamamlandi',  t:'Tamamlandı',   col:C.ok,   next:null,           nextK:null},
];
const CH={ vizz:{c:'ch-vizz',t:'VIZZ',i:'<path d="M3 3l9 18 2.5-7.5L22 11 3 3Z"/>'},
  tel:{c:'ch-tel',t:'Telefon',i:'<path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7l.5 2.8a2 2 0 0 1-.6 1.9L7.9 9.5a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 1.9-.6l2.8.5a2 2 0 0 1 1.7 2Z"/>'},
  ys:{c:'ch-ys',t:'Yemeksepeti',i:'<rect x="3" y="3" width="18" height="18" rx="4"/><path d="M8 12h8M12 8v8"/>'} };

/* mock canlı siparişler — Çapanoğlu menüsünden */
const M = R.menu; // [ad,desc,slug,fiyat]
let seq=7752;
let ORD=[
  {id:'VZ-7741',stage:'yeni',ch:'vizz',cust:'A. Demir · Fatih',sla:235,items:[[2,M[0][0]],[1,M[2][0],'Az şerbet']],tot:425},
  {id:'VZ-7748',stage:'yeni',ch:'tel',cust:'Telefon · Cumhuriyet',sla:55,items:[[1,M[1][0]],[2,M[3][0]]],tot:270},
  {id:'VZ-7746',stage:'hazirlaniyor',ch:'vizz',cust:'H. Çelik · Çapanoğlu',sla:410,items:[[3,M[0][0]],[1,M[1][0]]],tot:705},

  {id:'VZ-7743',stage:'hazir',ch:'vizz',cust:'S. Kaya · Köseoğlu',sla:90,items:[[2,M[1][0]]],tot:420,ready:true},

function fmtSec(s){ if(s<=0) return '0:00'; const m=Math.floor(s/60); return m+':'+String(s%60).padStart(2,'0'); }
function cdLabel(o){
  if(o.stage==='kuryede') return {cls:'warn',ic:'<circle cx="5.5" cy="17" r="3"/><circle cx="18.5" cy="17" r="3"/><path d="M8.5 17h6l-2.5-6H8"/>',txt:o.cmin+' dk yolda'};
  if(o.stage==='tamamlandi') return {cls:'ok',ic:'<path d="M5 12l4 4L19 6"/>',txt:'Teslim edildi'};
  if(o.stage==='hazir') return {cls:'ok',ic:'<path d="M5 12l5 5L20 7"/>',txt:'Pakette · bekliyor'};
  const cls=o.sla<=60?'bad':o.sla<=150?'warn':'ok';
  return {cls,ic:'<circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 1.5"/>',txt:fmtSec(o.sla)};
}

function card(o){
  const ch=CH[o.ch]; const st=STAGES.find(s=>s.k===o.stage); const cd=cdLabel(o);
  const items=o.items.map(it=>`<div class="it"><span class="q">${it[0]}×</span><span class="nm">${it[1]}${it[2]?`<span class="note">${it[2]}</span>`:''}</span></div>`).join('');
  const courier = o.courier ? `<div class="courier-line"><div class="av busy">${o.courier.split(' ').map(p=>p[0]).join('')}</div><span><b style="color:var(--tx)">${o.courier}</b>${o.cmin?` · ${o.cmin} dk`:' · teslim etti'}</span></div>` : '';
  const adv = st.next ? `<button class="btn ${o.stage==='kuryede'||o.stage==='hazir'?'btn-y':''} adv" onclick="RP.advance('${o.id}')">
      <svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>${st.next}</button>` : '';
  return `<div class="oc" id="oc-${o.id}">
    <div class="r1"><div><div class="id">${o.id}<span class="ch ${ch.c}"><svg class="ic" viewBox="0 0 24 24">${ch.i}</svg>${ch.t}</span></div><div class="cust">${o.cust}</div></div>
      <span class="cd ${cd.cls}"><svg class="ic" style="width:12px;height:12px" viewBox="0 0 24 24">${cd.ic}</svg>${cd.txt}</span></div>
    <div class="items">${items}</div>
    <div class="ftr"><span class="dim" style="font-size:11px">${o.items.reduce((a,b)=>a+b[0],0)} ürün</span><span class="tot">₺${o.tot}</span></div>
    ${courier}${adv}
  </div>`;
}

    const list=ORD.filter(o=>o.stage===s.k);
    const cards=list.map(card).join('') || `<div class="kempty">Bu kolonda<br>sipariş yok</div>`;
    return `<div class="kcol"><div class="kcol-h"><div class="t"><span class="dotc" style="background:${s.col}"></span>${s.t}</div><span class="n">${list.length}</span></div>
      <div class="kscroll ${list.length?'':'empty-soft'}">${cards}</div></div>`;
  }).join('');
  const live=ORD.filter(o=>o.stage!=='tamamlandi').length;

/* tek-tik ileri */
function advance(id){
  const o=ORD.find(x=>x.id===id); if(!o) return;
  const st=STAGES.find(s=>s.k===o.stage); if(!st.nextK) return;
  o.stage=st.nextK;
  if(o.stage==='kuryede'){ // kurye çağrıldı → otomatik ata
    const free=D.COURIERS.filter(c=>c.status==='online'); const k=free[Math.floor(Math.random()*free.length)]||D.COURIERS[1];
    o.courier=k.name; o.cmin=Math.floor(rnd(5,12));
    toast(`<b>${id}</b> hazır → kurye <b>${k.name}</b> çağrıldı (en yakın)`);
  } else if(o.stage==='hazir'){ o.ready=true; toast(`<b>${id}</b> pakete hazır — kurye atanmayı bekliyor`); }
  else if(o.stage==='tamamlandi'){ o.cmin=0; toast(`<b>${id}</b> teslim edildi · tebrikler`); }
  else if(o.stage==='hazirlaniyor'){ toast(`<b>${id}</b> mutfağa düştü — hazırlanıyor`); }
  renderKanban();
  const el=$('#oc-'+id); if(el){ el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),900); }
}

      <div class="setrow"><div class="lab">Yoğun saat modu<span class="ds">+10 dk hazırlık tamponu</span></div><button class="swp off" onclick="RP.flip(this,'Yoğun saat modu')"><i></i></button></div>
    </div>
  </div>`;
}
function flip(el,name){ el.classList.toggle('off'); toast(`<b>${name}</b> ${el.classList.contains('off')?'kapatıldı':'açıldı'}`); }
function seg(el){ el.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on')); el.classList.add('on'); toast('Hazırlık süresi: <b>'+el.textContent+'</b>'); }

/* ===================================================================
   GÖRÜNÜM YÖNETİMİ
   =================================================================== */
const names={pano:'Sipariş Panosu',menu:'Menü Yönetimi',kurye:'Kurye',raporlar:'Raporlar',ayarlar:'Ayarlar'};
const built={};
function go(v){
  document.querySelectorAll('.rail .ni').forEach(n=>n.classList.toggle('on',n.dataset.v===v));
  document.querySelectorAll('.content > section').forEach(s=>s.classList.remove('on'));
  $('#v-'+v).classList.add('on'); $('#viewName').textContent='· '+names[v];
  if(v==='raporlar') buildReports();
  if(v==='kurye') buildKurye();
  if(!built[v]){ built[v]=true; ({menu:buildMenu,ayarlar:buildAyarlar}[v]||(()=>{}))(); }
  setTimeout(()=>charts.forEach(c=>c.resize()),80);
}
document.querySelectorAll('.rail .ni').forEach(n=>n.onclick=()=>go(n.dataset.v));

/* init */
renderKanban();
window.RP={advance,toggle86,cat,callCourier,flip,seg,toast};
})();
</script>
</body></html>
