<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIZZ — Operasyon Merkezi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="vizz-pro.css">
<style>
  .app{display:grid;grid-template-columns:62px 1fr;height:100vh;overflow:hidden}
  /* rail */
  .rail{background:var(--s1);border-right:1px solid var(--line);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}
  .rail .lg{flex:none}
  .rail .lg{width:40px;height:40px;border-radius:11px;object-fit:cover;background:#000;margin-bottom:10px}
  .rail .ni{width:46px;height:44px;flex:none;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--tx-3);font-size:8.5px;font-weight:600;transition:.14s;border:none;background:transparent;position:relative}
  .rail .ni:hover{background:var(--s3);color:var(--tx)}
  .rail .ni.on{background:var(--y-soft);color:var(--y)}
  .rail .ni.on::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--y);border-radius:3px}
  .rail .ni .ic{width:19px;height:19px}
  .rail .sp{flex:1}
  /* main */
  .main{display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .top{height:54px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid var(--line);background:var(--s1)}
  .top .title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700}
  .top .title .sub{color:var(--tx-3);font-weight:500;font-size:12px}
  .top .live{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--ok);background:var(--ok-bg);padding:5px 10px;border-radius:20px;border:1px solid rgba(38,194,129,.25)}
  .top .live .dot{width:6px;height:6px;border-radius:50%;background:var(--ok)}
  .top .r{display:flex;align-items:center;gap:9px}
  .chip{display:flex;align-items:center;gap:7px;background:var(--s3);border:1px solid var(--line);border-radius:30px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--tx-2)}
  .chip b{color:var(--tx)} .chip .ic{color:var(--tx-3)}
  .content{flex:1;overflow:hidden;position:relative}
  /* FERAH: içerik ortalanmış geniş kolon + cömert boşluk (Minijett duruşu) */
  .view{position:absolute;inset:0;overflow:auto;padding:36px clamp(28px,calc((100% - 1260px)/2),240px) 64px;display:none}
  .view.on{display:block}

  /* KOMUTA */
  #v-komuta{display:none;grid-template-rows:auto 1fr;gap:14px;padding:16px;position:absolute;inset:0;overflow:hidden}
  #v-komuta.on{display:grid}
  .kstrip{display:grid;grid-template-columns:repeat(6,1fr);gap:11px}
  .kbody{display:grid;grid-template-columns:1.62fr 1fr;gap:14px;min-height:0;overflow:hidden}
  .mapwrap{position:relative;border:1px solid var(--line);border-radius:var(--r-xl);overflow:hidden;background:#0d0f12}
  #noc{position:absolute;inset:0}
  .maptop{position:absolute;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:13px 15px;
    background:linear-gradient(180deg,rgba(11,12,14,.9),transparent);pointer-events:none}
  .maptop .t{font-size:13px;font-weight:700;color:#fff;display:flex;gap:8px;align-items:center;pointer-events:auto}
  .rcol{display:flex;flex-direction:column;gap:14px;min-height:0;overflow:hidden}
  .panel{background:var(--s2);border:1px solid var(--line);border-radius:var(--r-lg);display:flex;flex-direction:column;overflow:hidden}
  .panel .scroll{overflow-y:auto;padding:11px 12px}

  /* RAPORLAR */
  .rgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:13px}
  .rgrid .card{display:flex;flex-direction:column}
  .chart{width:100%;flex:1;min-height:0}
  .col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-5{grid-column:span 5}.col-6{grid-column:span 6}.col-7{grid-column:span 7}.col-8{grid-column:span 8}.col-12{grid-column:span 12}
  .rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
  .rhead h2{font-size:24px;font-weight:800;letter-spacing:-.4px}.rhead p{font-size:13px;color:var(--tx-3);margin-top:4px}
  .big{font-size:30px;font-weight:800;color:var(--tx)} .big small{font-size:13px;color:var(--tx-2);font-weight:600}

  /* ===== FERAH override'lar (yalnız content view'lerinde; Komuta hariç) ===== */
  .view .kstrip{gap:16px;margin-bottom:22px}
  .view .kpi{padding:18px 20px;border-radius:15px}
  .view .kpi .lab{font-size:11.5px}
  .view .kpi .val{font-size:30px;margin-top:9px}
  .view .kpi .sub{font-size:12px;margin-top:9px}
  .view .card{border-radius:16px}
  .view .card-h{padding:16px 22px}
  .view .card-h .t{font-size:14.5px}
  .view table.grid th{padding:14px 22px;font-size:11px}
  .view table.grid td{padding:15px 22px;font-size:13px}
  .view .rgrid{gap:18px}
  /* sekme şeridi (modül içi alt-nav) */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:26px}
  .tabs button{background:none;border:none;color:var(--tx-3);font-size:14px;font-weight:600;padding:12px 18px;position:relative;transition:.14s}
  .tabs button:hover{color:var(--tx-2)}
  .tabs button.on{color:var(--y)}
  .tabs button.on::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:2px;background:var(--y);border-radius:2px}
  /* ferah ayar kartı deseni (Minijett setting-card) */
  .setcard{background:var(--s2);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin-bottom:16px}
  .setcard.accent{background:linear-gradient(120deg,var(--y-soft),var(--s2) 60%);border-color:var(--y-line)}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:16px 0;border-top:1px solid var(--line)}
  .setrow:first-child{border-top:none}
  .setrow .lab{font-size:14px;font-weight:600;color:var(--tx)}
  .setrow .desc{font-size:12.5px;color:var(--tx-3);margin-top:4px;max-width:560px;line-height:1.5}
  .sectitle{font-size:13px;font-weight:700;color:var(--tx-2);text-transform:uppercase;letter-spacing:.6px;margin:4px 0 12px}
  /* toggle (sarı=açık / gri=kapalı) + metin durum etiketi */
  .sw{width:46px;height:26px;border-radius:30px;background:var(--s4);border:1px solid var(--line-2);position:relative;flex:none;transition:.18s;cursor:pointer}
  .sw i{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.18s}
  .sw.on{background:var(--y);border-color:var(--y)} .sw.on i{left:22px;background:#15140F}
  .swwrap{display:flex;align-items:center;gap:11px}
  .swwrap .st{font-size:10.5px;font-weight:800;letter-spacing:.5px;color:var(--tx-3)} .swwrap .st.on{color:var(--y)}
  .selbox{background:var(--s3);border:1px solid var(--line-2);border-radius:11px;padding:12px 14px;font-size:13.5px;color:var(--tx);width:100%;display:flex;align-items:center;justify-content:space-between}
  .selbox:hover{border-color:var(--line-3)}
  .field{margin-bottom:18px}
  .field>label{display:block;font-size:12px;font-weight:600;color:var(--tx-2);margin-bottom:7px}
  .field .hint{font-size:12px;color:var(--tx-3);margin-top:7px;line-height:1.5}
  .inp{background:var(--s3);border:1px solid var(--line-2);border-radius:11px;padding:12px 14px;font-size:14px;color:var(--tx);width:100%}
  /* KPI BAND — her sayfada sabit (Minijett imzası) */
  .kpibar{flex:none;display:flex;align-items:stretch;height:50px;border-bottom:1px solid var(--line);background:var(--s1);overflow-x:auto;scrollbar-width:none}
  .kpibar::-webkit-scrollbar{display:none}
  .kpibar .pill{display:flex;align-items:center;gap:9px;padding:0 18px;border-right:1px solid var(--line);white-space:nowrap;flex:none}
  .kpibar .pill .dot{width:7px;height:7px;border-radius:50%;flex:none}
  .kpibar .pill .lab{color:var(--tx-3);font-size:11.5px;font-weight:600}
  .kpibar .pill .val{color:var(--tx);font-size:13px;font-weight:700}
  .kpibar .grow{flex:1;border:none}
  /* çok-kanal entegrasyon */
  .chan{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:30px;border:1px solid;white-space:nowrap}
  .chan .dot{width:5px;height:5px;border-radius:50%}
  @keyframes newdrop{0%{transform:translateY(-10px);opacity:0;box-shadow:0 0 0 2px var(--y) inset}60%{opacity:1}100%{transform:none;box-shadow:0 0 0 0 transparent inset}}
  .ord.newdrop{animation:newdrop .85s cubic-bezier(.16,1,.3,1)}
  .chanbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:9px 13px;border-bottom:1px solid var(--line);font-size:11px;color:var(--tx-3);background:var(--s1)}
  .chanbar .c{display:inline-flex;align-items:center;gap:5px;font-weight:700}
  .chanbar .c i{width:6px;height:6px;border-radius:50%}
  .autotgl{display:inline-flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--line-2);color:var(--tx-3);font-size:11px;font-weight:800;padding:6px 11px;border-radius:30px;cursor:pointer;white-space:nowrap}
  .autotgl.on{background:var(--y-soft);border-color:var(--y-line);color:var(--y)}
  .autotgl .ic{width:14px;height:14px}
  /* tıklanabilir KPI kartı */
  .kpi.clk{cursor:pointer;transition:.14s} .kpi.clk:hover{border-color:var(--line-3);transform:translateY(-2px)}
  .kpi .more{position:absolute;top:12px;right:13px;color:var(--tx-4);opacity:0;transition:.14s} .kpi.clk:hover .more{opacity:1}
  /* MODAL (ortalı) */
  .modal{position:fixed;inset:0;z-index:1000;background:rgba(6,7,9,.62);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:24px}
  .modal.on{display:flex;animation:mfade .16s ease}
  @keyframes mfade{from{opacity:0}to{opacity:1}}
  .modal .mcard{background:var(--s2);border:1px solid var(--line-2);border-radius:18px;width:min(560px,100%);max-height:86vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-pop);animation:mpop .2s cubic-bezier(.16,1,.3,1)}
  @keyframes mpop{from{transform:translateY(14px) scale(.985);opacity:0}to{transform:none;opacity:1}}
  .modal .mhead{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:17px 20px;border-bottom:1px solid var(--line)}
  .modal .mhead .t{font-size:16px;font-weight:800;display:flex;align-items:center;gap:10px}
  .modal .mhead .t .ic{color:var(--y)}
  .modal .mbody{overflow:auto;padding:18px 20px}
  .mrow{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .mrow:last-child{border:none}

  @media(max-width:1100px){.kstrip{grid-template-columns:repeat(3,1fr)}.kbody{grid-template-columns:1fr}}
</style></head><body>
<div class="app">
  <!-- RAIL -->
  <aside class="rail">
    <img class="lg" id="logo" alt="VIZZ">
    <button class="ni on" data-v="komuta" title="Komuta"><svg class="ic" viewBox="0 0 24 24"><path d="M9 3 4 5v16l5-2 6 2 5-2V3l-5 2-6-2Z"/><path d="M9 3v16M15 5v16"/></svg>Komuta</button>
    <button class="ni" data-v="gorevler" title="Siparişler"><svg class="ic" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Sipariş</button>
    <button class="ni" data-v="kuryeler" title="Kuryeler"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Kuryeler</button>
    <button class="ni" data-v="dukkanlar" title="Dükkanlar"><svg class="ic" viewBox="0 0 24 24"><path d="M3 11 4.5 5h15L21 11M4 11v9h16v-9M3 11h18M9 20v-5h6v5"/></svg>Dükkan</button>
    <button class="ni" data-v="atama" title="Atama Ayarları"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>Atama</button>
    <button class="ni" data-v="otomasyon" title="Otomasyon"><svg class="ic" viewBox="0 0 24 24"><path d="M12 2 4 6v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V6l-8-4Z"/><path d="M9 12l2 2 4-4"/></svg>Otomasyon</button>
    <button class="ni" data-v="bolgeler" title="Bölgeler"><svg class="ic" viewBox="0 0 24 24"><path d="M9 3 4 5v16l5-2 6 2 5-2V3l-5 2-6-2Z"/><circle cx="12" cy="10" r="2.5"/></svg>Bölgeler</button>
    <button class="ni" data-v="tasima" title="Taşıma Ücretleri"><svg class="ic" viewBox="0 0 24 24"><path d="M20.6 13.4 12 22l-9-9V3h10l7.6 7.6a2 2 0 0 1 0 2.8Z"/><circle cx="7.5" cy="7.5" r="1.4"/></svg>Ücretler</button>
    <button class="ni" data-v="finans" title="Finans & Hakediş"><svg class="ic" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finans</button>
    <button class="ni" data-v="kontor" title="Kontör / Bakiye"><svg class="ic" viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="13" rx="2.5"/><path d="M2.5 10.5h19M16.5 15h2"/></svg>Kontör</button>
    <button class="ni" data-v="kullanicilar" title="Kullanıcılar"><svg class="ic" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.3 2.9-5.2 6.5-5.2M16 11a3 3 0 1 0 0-6M21.5 20c0-2.4-1.9-4.1-4.7-4.8"/></svg>Kişiler</button>
    <button class="ni" data-v="raporlar" title="Raporlar"><svg class="ic" viewBox="0 0 24 24"><path d="M3 3v18h18"/><rect x="7" y="9" width="3" height="8" rx="1"/><rect x="13" y="5" width="3" height="12" rx="1"/></svg>Raporlar</button>
    <button class="ni" data-v="duyurular" title="Duyurular"><svg class="ic" viewBox="0 0 24 24"><path d="M3 11v2a1 1 0 0 0 1 1h2l9 5V5L6 10H4a1 1 0 0 0-1 1Z"/><path d="M18 8.5a4 4 0 0 1 0 7"/></svg>Duyuru</button>
    <div class="sp"></div>
    <button class="ni" data-v="ayarlar" title="Ayarlar"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 2.6 14H2a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4 8.4a1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 9 4.6V4a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 2.7 1.1 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V10a2 2 0 1 1 0 4h-.1Z"/></svg>Ayar</button>
    <button class="ni" data-v="destek" title="Destek Merkezi"><svg class="ic" viewBox="0 0 24 24"><path d="M4 14v-2a8 8 0 0 1 16 0v2"/><rect x="2.5" y="13.5" width="4.5" height="6" rx="2"/><rect x="17" y="13.5" width="4.5" height="6" rx="2"/></svg>Destek</button>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="top">
      <div class="title">VIZZ <span class="hl">Operasyon Merkezi</span> <span class="sub" id="viewName">· Komuta</span></div>
      <div class="r">
        <span class="live"><span class="dot pulse"></span> CANLI</span>
        <span class="chip"><svg class="ic ic-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> <b id="clock">--:--</b></span>
        <span class="chip"><span style="width:7px;height:7px;border-radius:50%;background:var(--ok);display:inline-block"></span> <b id="onlineN">0</b>/15 kurye</span>
        <button class="chip" style="cursor:pointer" id="alertChip"><svg class="ic ic-sm" viewBox="0 0 24 24" style="color:var(--warn)"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></svg> <b id="alertN">3</b> uyarı</button>
        <img class="lg" id="logo2" style="height:32px;width:32px;border-radius:9px" alt="">
      </div>
    </div>

    <!-- SABİT KPI ŞERİDİ (her sayfada) -->
    <div class="kpibar" id="kpibar"></div>

    <div class="content">
      <!-- KOMUTA -->
      <section id="v-komuta" class="on">
        <div class="kstrip" id="kpis"></div>
        <div class="kbody">
          <div class="mapwrap">
            <div class="maptop"><div class="t"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M9 3 4 5v16l5-2 6 2 5-2V3l-5 2-6-2Z"/></svg> Canlı Komuta Haritası · Yozgat</div></div>
            <div id="noc"></div>
            <div class="maptools">
              <button id="t-heat" title="Yoğunluk ısı haritası"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M12 2C9 7 7 9 7 13a5 5 0 0 0 10 0c0-4-2-6-5-11Z"/></svg></button>
              <button id="t-fit" title="Bölgeye sığdır"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg></button>
            </div>
            <div class="maplegend"><span><i style="background:var(--y)"></i>Teslimatta</span><span><i style="background:var(--ok)"></i>Müsait</span><span><i style="background:var(--info)"></i>Restoran</span><span><i style="background:var(--y-line)"></i>Kapsama</span></div>
          </div>
          <div class="rcol">
            <div class="panel" style="flex:1;min-height:0">
              <div class="card-h"><div class="t"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="M9 11l3 3 8-8"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Atama Kuyruğu</div>
                <div style="display:flex;align-items:center;gap:8px"><button class="autotgl on" id="autoTgl" onclick="VZ.toggleAuto()" title="AÇIK iken motor otomatik atar; KAPALI'da sen atarsın"><svg class="ic ic-sm" viewBox="0 0 24 24"><path d="m13 2-3 7h6l-5 13 2-9H7l4-11Z"/></svg><span>Oto AÇIK</span></button>
                <div class="seg"><button class="on" id="q-all">Tümü</button><button id="q-wait">Bekleyen</button><button id="q-market">Market</button></div></div></div>
              <div class="chanbar"><span class="dot pulse" style="width:7px;height:7px;border-radius:50%;background:var(--ok)"></span><b style="color:var(--tx-2)">Canlı kanal akışı</b>
                <span class="c" style="color:#7B5CF0"><i style="background:#7B5CF0"></i>Getir</span>
                <span class="c" style="color:#FA0050"><i style="background:#FA0050"></i>Yemeksepeti</span>
                <span class="c" style="color:#F27A1A"><i style="background:#F27A1A"></i>Trendyol</span>
                <span class="c" style="color:#FFC400"><i style="background:#FFC400"></i>VIZZ App</span>
                <span style="margin-left:auto;color:var(--ok);font-weight:700">● bağlı</span></div>
              <div class="scroll" id="queue" style="flex:1"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- GÖREVLER -->
      <section id="v-gorevler" class="view"></section>
      <!-- KURYELER -->
      <section id="v-kuryeler" class="view"></section>
      <!-- DÜKKANLAR -->
      <section id="v-dukkanlar" class="view"></section>
      <!-- OTOMASYON -->
      <section id="v-otomasyon" class="view"></section>
      <!-- BÖLGELER -->
      <section id="v-bolgeler" class="view"></section>
      <!-- FİNANS -->
      <section id="v-finans" class="view"></section>
      <!-- RAPORLAR -->
      <section id="v-raporlar" class="view">
        <div class="rhead"><div><h2>Operasyon Analitiği</h2><p>Bugün · Yozgat merkez — rakiplerin yüzeysel raporlarına karşı derinlik</p></div>
          <div class="seg"><button class="on">Bugün</button><button>7 gün</button><button>30 gün</button></div></div>
        <div id="reportGrid" class="rgrid"></div>
      </section>
